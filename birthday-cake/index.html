<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Happy Birthday Avani 🎂</title>
  <link rel="icon" href="../favicon.ico"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Cinzel:wght@400;600&family=Poppins:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --rose:#ff6b8a;--rose2:#ff3366;--gold:#ffd700;--gold2:#ffaa00;
      --lavender:#c084fc;--teal:#2dd4bf;
      --deep:#060412;--card:#ffffff09;
    }
    html{scroll-behavior:smooth}
    body{
      min-height:100vh;
      background:var(--deep);
      font-family:'Poppins',sans-serif;
      color:#fff;
      overflow-x:hidden;
      padding-bottom:140px;
      position:relative;
    }

    /* ══════════════════════════════
       STARFIELD CANVAS
    ══════════════════════════════ */
    #starCanvas{
      position:fixed;inset:0;z-index:0;
      pointer-events:none;
    }

    /* ══════════════════════════════
       AURORA GLOW BACKGROUND
    ══════════════════════════════ */
    .aurora{
      position:fixed;inset:0;z-index:0;pointer-events:none;
      overflow:hidden;
    }
    .aurora-blob{
      position:absolute;
      border-radius:50%;
      filter:blur(80px);
      opacity:0;
      transition:opacity 2s ease;
    }
    .aurora-blob.show{opacity:.18;}
    .ab1{width:600px;height:600px;background:radial-gradient(circle,#7c3aed,transparent);top:-200px;left:-150px;animation:blobMove1 20s ease-in-out infinite;}
    .ab2{width:500px;height:500px;background:radial-gradient(circle,#db2777,transparent);top:30%;right:-200px;animation:blobMove2 25s ease-in-out infinite;}
    .ab3{width:700px;height:700px;background:radial-gradient(circle,#0891b2,transparent);bottom:-300px;left:20%;animation:blobMove3 30s ease-in-out infinite;}
    @keyframes blobMove1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(80px,60px) scale(1.2)}}
    @keyframes blobMove2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-60px,80px) scale(1.15)}}
    @keyframes blobMove3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-60px) scale(1.1)}}

    /* ══════════════════════════════
       INTRO SCREEN
    ══════════════════════════════ */
    #intro{
      position:fixed;inset:0;z-index:9999;
      background:var(--deep);
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:24px;
      transition:opacity 1.2s ease, visibility 1.2s ease;
    }
    #intro.hide{opacity:0;visibility:hidden;pointer-events:none;}
    .intro-heart{
      font-size:5rem;
      animation:heartBeat 1.2s ease-in-out infinite;
      filter:drop-shadow(0 0 20px #ff6b8a);
    }
    @keyframes heartBeat{0%,100%{transform:scale(1)}14%{transform:scale(1.3)}28%{transform:scale(1)}42%{transform:scale(1.2)}70%{transform:scale(1)}}
    .intro-text{
      font-family:'Dancing Script',cursive;
      font-size:clamp(1.8rem,6vw,3rem);
      background:linear-gradient(135deg,#ff6b8a,#ffd700,#c084fc);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      text-align:center;padding:0 20px;
    }
    .intro-sub{font-size:.85rem;letter-spacing:3px;text-transform:uppercase;opacity:.5;}
    .tap-btn{
      margin-top:16px;
      padding:16px 48px;
      border-radius:50px;
      border:none;
      background:linear-gradient(135deg,#ff3366,#ff6b8a,#ffaa00);
      background-size:200% auto;
      color:#fff;
      font-family:'Poppins',sans-serif;
      font-size:1rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;
      cursor:pointer;
      animation:shimmerBtn 3s linear infinite, tapPulse 2s ease-in-out infinite;
      box-shadow:0 0 40px rgba(255,107,138,.5),0 0 80px rgba(255,107,138,.2);
    }
    @keyframes shimmerBtn{to{background-position:200% center}}
    @keyframes tapPulse{0%,100%{box-shadow:0 0 30px rgba(255,107,138,.4)}50%{box-shadow:0 0 60px rgba(255,107,138,.8),0 0 100px rgba(255,107,138,.3)}}
    .tap-btn:hover{transform:scale(1.06);}

    /* ══════════════════════════════
       MAIN CONTENT
    ══════════════════════════════ */
    #mainContent{
      position:relative;z-index:10;
      opacity:0;
      transition:opacity 1s ease .3s;
    }
    #mainContent.show{opacity:1;}

    /* ── HEADER ── */
    .site-header{
      text-align:center;padding:48px 20px 8px;
    }
    .header-eyebrow{
      font-size:.75rem;letter-spacing:5px;text-transform:uppercase;
      opacity:0;color:#ffd700;
      animation:none;
    }
    .header-eyebrow.anim{opacity:1;animation:fadeSlideDown .8s ease both .2s;}
    @keyframes fadeSlideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}

    .site-title{
      font-family:'Dancing Script',cursive;
      font-size:clamp(3.2rem,11vw,6rem);
      line-height:1.05;
      background:linear-gradient(135deg,#ff6b8a 0%,#ffb3c1 35%,#ffd700 65%,#ff6b8a 100%);
      background-size:300% auto;
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      animation:shimmer 5s linear infinite;
      opacity:0;
      transition:opacity .8s ease .4s;
      text-shadow:none;
    }
    .site-title.show{opacity:1;}
    @keyframes shimmer{to{background-position:300% center}}

    .site-subtitle{
      font-size:.9rem;font-weight:300;letter-spacing:2px;
      opacity:0;color:rgba(255,255,255,.6);
      transition:opacity .8s ease .8s;
      margin-top:8px;
    }
    .site-subtitle.show{opacity:1;}

    /* ── BULBS ── */
    .bulbs-row{
      display:flex;justify-content:center;gap:10px;flex-wrap:wrap;
      padding:20px 16px 8px;position:relative;z-index:10;
    }
    .bulb-item{
      width:30px;height:42px;
      background:url('assets/bulb.png') center/contain no-repeat;
      transition:filter .4s ease, transform .3s ease;
    }
    .bulb-item.lit{transform:scale(1.15);}
    .bulb-item.lit-y{background-image:url('assets/bulb_yellow.png');animation:glow-y 1.1s ease-in-out infinite alternate;}
    .bulb-item.lit-r{background-image:url('assets/bulb_red.png');animation:glow-r 1.4s ease-in-out infinite alternate;}
    .bulb-item.lit-b{background-image:url('assets/bulb_blue.png');animation:glow-b 1.0s ease-in-out infinite alternate;}
    .bulb-item.lit-g{background-image:url('assets/bulb_green.png');animation:glow-g 1.7s ease-in-out infinite alternate;}
    .bulb-item.lit-p{background-image:url('assets/bulb_pink.png');animation:glow-p 0.9s ease-in-out infinite alternate;}
    .bulb-item.lit-o{background-image:url('assets/bulb_orange.png');animation:glow-o 1.8s ease-in-out infinite alternate;}
    @keyframes glow-y{from{filter:brightness(1) drop-shadow(0 0 3px #ffd70080)}to{filter:brightness(2) drop-shadow(0 0 16px #ffd700)}}
    @keyframes glow-r{from{filter:brightness(1) drop-shadow(0 0 3px #ff333380)}to{filter:brightness(2) drop-shadow(0 0 16px #ff3333)}}
    @keyframes glow-b{from{filter:brightness(1) drop-shadow(0 0 3px #3388ff80)}to{filter:brightness(2) drop-shadow(0 0 16px #3388ff)}}
    @keyframes glow-g{from{filter:brightness(1) drop-shadow(0 0 3px #33cc3380)}to{filter:brightness(2) drop-shadow(0 0 16px #33cc33)}}
    @keyframes glow-p{from{filter:brightness(1) drop-shadow(0 0 3px #ff69b480)}to{filter:brightness(2) drop-shadow(0 0 16px #ff69b4)}}
    @keyframes glow-o{from{filter:brightness(1) drop-shadow(0 0 3px #ff880080)}to{filter:brightness(2) drop-shadow(0 0 16px #ff8800)}}

    /* ── BANNER ── */
    .banner-wrap{
      text-align:center;overflow:hidden;height:88px;
      position:relative;z-index:10;
    }
    .banner-img{
      max-width:80%;max-height:82px;
      transform:translateY(-300px);
      transition:transform 1.4s cubic-bezier(.34,1.56,.64,1);
    }
    .banner-img.dropped{transform:translateY(0);}

    /* ── HBD HEADING ── */
    .hbd-heading{
      text-align:center;padding:4px 20px 0;position:relative;z-index:10;
      display:none;
    }
    .hbd-heading.show{display:block;}
    .hbd-heading span{
      display:block;font-size:.8rem;letter-spacing:4px;
      text-transform:uppercase;opacity:.6;
      animation:fadeSlideDown .6s ease both;
    }
    .hbd-heading strong{
      display:block;
      font-family:'Dancing Script',cursive;
      font-size:clamp(2rem,8vw,3.5rem);
      background:linear-gradient(135deg,#ff6b8a,#ffd700,#c084fc);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      text-shadow:none;
      animation:popIn .8s cubic-bezier(.34,1.56,.64,1) both .1s;
    }
    @keyframes popIn{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}

    /* ══════════════════════════════
       CAKE SCENE
    ══════════════════════════════ */
    .cake-scene{
      position:relative;z-index:10;
      width:min(380px,90vw);
      height:min(380px,90vw);
      margin:8px auto 4px;
      display:none;
      align-items:flex-end;
      justify-content:center;
    }
    .cake-scene.show{
      display:flex;
      animation:cakeEntrance 1s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes cakeEntrance{from{opacity:0;transform:scale(.3) translateY(60px)}to{opacity:1;transform:scale(1) translateY(0)}}

    /* Spinning glow ring */
    .cake-glow-ring{
      position:absolute;
      bottom:-10px;left:50%;
      transform:translateX(-50%);
      width:260px;height:260px;
      border-radius:50%;
      background:conic-gradient(from 0deg,#ff6b8a,#ffd700,#c084fc,#2dd4bf,#ff6b8a);
      animation:spinRing 6s linear infinite;
      opacity:.35;
      filter:blur(30px);
    }
    @keyframes spinRing{to{transform:translateX(-50%) rotate(360deg)}}

    /* Shadow ellipse */
    .cake-shadow{
      position:absolute;bottom:-6px;left:50%;
      transform:translateX(-50%);
      width:220px;height:28px;
      background:radial-gradient(ellipse,rgba(255,107,138,.5) 0%,transparent 70%);
      border-radius:50%;
      animation:shadowBreath 3.5s ease-in-out infinite;
    }
    @keyframes shadowBreath{0%,100%{opacity:.6;width:200px}50%{opacity:.9;width:250px}}

    .cake-svg{
      width:min(300px,85vw);height:auto;
      animation:cakeFloat 3.8s ease-in-out infinite;
      filter:drop-shadow(0 0 0 transparent);
      position:relative;z-index:2;
      transition:filter .5s ease;
    }
    .cake-svg.lit{
      filter:drop-shadow(0 -8px 25px rgba(255,220,100,.6)) drop-shadow(0 20px 40px rgba(255,107,138,.4));
    }
    @keyframes cakeFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}

    /* ── FLAMES ── */
    .flame-group{
      position:absolute;
      top:8px;left:50%;
      transform:translateX(-50%);
      display:none;z-index:20;
      gap:20px;
    }
    .flame-group.show{display:flex;}
    .flame-outer{position:relative;width:20px;height:40px;}
    .flame-core{
      position:absolute;bottom:0;left:50%;transform:translateX(-50%);
      width:10px;height:28px;
      background:radial-gradient(ellipse at 50% 100%,#fff 0%,#ffe066 30%,#ff9a00 70%,transparent 100%);
      border-radius:50% 50% 20% 20%/60% 60% 30% 30%;
      animation:flameCore 1s ease-in-out infinite alternate;
      filter:blur(.5px);
    }
    .flame-aura{
      position:absolute;bottom:0;left:50%;transform:translateX(-50%);
      width:20px;height:38px;
      background:radial-gradient(ellipse at 50% 100%,rgba(255,180,0,.6) 0%,rgba(255,80,0,.2) 60%,transparent 100%);
      border-radius:50% 50% 30% 30%/60% 60% 40% 40%;
      animation:flameAura 1.3s ease-in-out infinite alternate;
      filter:blur(3px);
    }
    @keyframes flameCore{from{transform:translateX(-50%) scaleX(1) rotate(-4deg)}to{transform:translateX(-50%) scaleX(.8) rotate(4deg)}}
    @keyframes flameAura{from{transform:translateX(-50%) scale(1) rotate(-5deg);opacity:.7}to{transform:translateX(-50%) scale(.85) rotate(5deg);opacity:.9}}

    /* ══════════════════════════════
       BALLOONS
    ══════════════════════════════ */
    .balloon{
      position:fixed;
      width:85px;height:155px;
      background-size:contain;background-repeat:no-repeat;
      bottom:-220px;opacity:.9;z-index:50;
      pointer-events:none;
      transition:bottom 5s cubic-bezier(.25,.46,.45,.94);
    }
    .balloon h2{
      font-family:'Dancing Script',cursive;
      font-size:2.8rem;font-weight:700;
      text-align:center;margin-top:6px;
      animation:letterPop 2s ease-in-out infinite;
    }
    @keyframes letterPop{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
    .balloon-border-img{
      position:fixed;top:100%;left:0;width:100%;
      opacity:.55;z-index:9999;pointer-events:none;
      transition:top 6s cubic-bezier(.25,.46,.45,.94);
    }

    /* ══════════════════════════════
       MESSAGE CARD
    ══════════════════════════════ */
    .msg-card{
      display:none;position:relative;z-index:10;
      margin:16px auto 20px;
      max-width:min(580px,90vw);
      padding:40px 32px;
      background:linear-gradient(135deg,rgba(255,107,138,.06),rgba(192,132,252,.06));
      backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
      border-radius:28px;
      border:1px solid rgba(255,107,138,.2);
      box-shadow:0 30px 80px rgba(0,0,0,.6),
                 inset 0 1px 0 rgba(255,255,255,.08),
                 0 0 60px rgba(255,107,138,.08);
      text-align:center;
    }
    .msg-card.show{display:block;animation:msgReveal .9s ease both;}
    @keyframes msgReveal{from{opacity:0;transform:translateY(50px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}

    .msg-line{
      font-size:clamp(1rem,2.5vw,1.2rem);
      font-weight:300;line-height:1.8;
      color:rgba(255,255,255,.92);
      min-height:1.8em;
      margin:6px 0;
    }
    .msg-line .char{
      display:inline-block;
      opacity:0;
      transform:translateY(10px);
      transition:opacity .04s ease, transform .04s ease;
    }
    .msg-line .char.visible{opacity:1;transform:translateY(0);}

    .love-finale{
      display:none;
      font-family:'Dancing Script',cursive;
      font-size:clamp(2rem,6vw,2.8rem);
      background:linear-gradient(135deg,#ff6b8a,#ffd700,#c084fc);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      margin-top:20px;
      animation:shimmer 3s linear infinite,heartBeat 2s ease-in-out infinite;
    }
    @keyframes heartBeat{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
    .love-finale.show{display:block;}

    /* ══════════════════════════════
       STEP BUTTON BAR
    ══════════════════════════════ */
    .btn-bar{
      position:fixed;bottom:0;left:0;right:0;z-index:100;
      padding:16px 20px 24px;
      background:linear-gradient(to top,rgba(6,4,18,1) 50%,rgba(6,4,18,0));
      display:flex;justify-content:center;gap:10px;flex-wrap:wrap;
    }
    .step-btn{
      display:none;
      padding:14px 30px;
      border-radius:50px;
      border:1.5px solid rgba(255,107,138,.35);
      background:rgba(255,107,138,.1);
      color:#fff;
      font-family:'Poppins',sans-serif;
      font-size:.82rem;font-weight:500;
      letter-spacing:1.5px;text-transform:uppercase;
      cursor:pointer;
      backdrop-filter:blur(12px);
      transition:all .4s cubic-bezier(.34,1.56,.64,1);
      position:relative;overflow:hidden;
    }
    .step-btn::after{
      content:'';
      position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
      opacity:0;transition:opacity .3s;
    }
    .step-btn:hover::after{opacity:1;}
    .step-btn.active{display:inline-flex;align-items:center;gap:8px;}
    .step-btn:hover{
      background:rgba(255,107,138,.28);
      border-color:rgba(255,107,138,.75);
      transform:translateY(-5px) scale(1.06);
      box-shadow:0 14px 36px rgba(255,107,138,.4),0 0 0 1px rgba(255,107,138,.3);
    }
    .step-btn:active{transform:translateY(-2px) scale(1.02);}

    /* ══════════════════════════════
       FIREWORKS CANVAS
    ══════════════════════════════ */
    #fwCanvas{
      position:fixed;inset:0;z-index:999;pointer-events:none;
      opacity:0;transition:opacity .5s;
    }
    #fwCanvas.show{opacity:1;}

    /* ══════════════════════════════
       ROSE PETALS
    ══════════════════════════════ */
    .petal{
      position:fixed;pointer-events:none;z-index:300;
      font-size:1.4rem;
      animation:petalFall linear forwards;
      opacity:0;
    }
    @keyframes petalFall{
      0%{transform:translateY(-40px) rotate(0deg) scale(.8);opacity:0}
      10%{opacity:.85}
      90%{opacity:.85}
      100%{transform:translateY(105vh) rotate(480deg) scale(1.1);opacity:0}
    }

    /* floating hearts after wish */
    .float-heart{
      position:fixed;bottom:-30px;pointer-events:none;z-index:200;
      font-size:1.6rem;
      animation:heartFloat linear forwards;
      opacity:0;
    }
    @keyframes heartFloat{
      0%{transform:translateY(0) scale(.6);opacity:0}
      10%{opacity:.9}
      90%{opacity:.9}
      100%{transform:translateY(-110vh) scale(1.2);opacity:0}
    }

    audio{display:none;}

    @media(max-width:480px){
      .tap-btn{padding:14px 36px;}
      .msg-card{padding:28px 20px;}
    }
  </style>
</head>
<body>

<!-- Fireworks canvas -->
<canvas id="fwCanvas"></canvas>

<!-- Star canvas -->
<canvas id="starCanvas"></canvas>

<!-- Aurora blobs -->
<div class="aurora">
  <div class="aurora-blob ab1"></div>
  <div class="aurora-blob ab2"></div>
  <div class="aurora-blob ab3"></div>
</div>

<!-- Audio -->
<audio class="song" loop>
  <source src="assets/jaaniye.mp3" type="audio/mpeg">
</audio>

<!-- ══ INTRO SCREEN ══ -->
<div id="intro">
  <div class="intro-heart">💝</div>
  <p class="intro-text">Something magical<br>is waiting for you…</p>
  <p class="intro-sub">A surprise made with love</p>
  <button class="tap-btn" id="tapToBegin">✨ Tap to Begin ✨</button>
</div>

<!-- ══ MAIN CONTENT ══ -->
<div id="mainContent">

  <!-- Header -->
  <div class="site-header">
    <p class="header-eyebrow" id="eyebrow">💫 A Special Birthday Surprise 💫</p>
    <h1 class="site-title" id="siteTitle">Happy Birthday<br>Avani 🌹</h1>
    <p class="site-subtitle" id="siteSub">Open each moment and let the magic unfold…</p>
  </div>

  <!-- Bulbs -->
  <div class="bulbs-row">
    <div class="bulb-item" id="bulb_yellow"></div>
    <div class="bulb-item" id="bulb_red"></div>
    <div class="bulb-item" id="bulb_blue"></div>
    <div class="bulb-item" id="bulb_green"></div>
    <div class="bulb-item" id="bulb_pink"></div>
    <div class="bulb-item" id="bulb_orange"></div>
  </div>

  <!-- Banner -->
  <div class="banner-wrap">
    <img src="assets/banner.png" class="banner-img" id="banner" alt="">
  </div>

  <!-- HBD Heading -->
  <div class="hbd-heading" id="hbdHeading">
    <span>Wishing you the most wonderful</span>
    <strong>Happy Birthday, Avani! 🌸</strong>
  </div>

  <!-- ── CAKE SCENE ── -->
  <div class="cake-scene" id="cakeScene">
    <div class="cake-glow-ring"></div>
    <div class="cake-shadow"></div>
    <!-- Flames -->
    <div class="flame-group" id="flameGroup">
      <div class="flame-outer"><div class="flame-core"></div><div class="flame-aura"></div></div>
      <div class="flame-outer" style="animation-delay:.2s"><div class="flame-core" style="animation-delay:.15s"></div><div class="flame-aura" style="animation-delay:.25s"></div></div>
      <div class="flame-outer" style="animation-delay:.4s"><div class="flame-core" style="animation-delay:.3s"></div><div class="flame-aura" style="animation-delay:.1s"></div></div>
    </div>
    <!-- SVG Cake -->
    <svg class="cake-svg" id="cakeSvg" viewBox="0 0 300 280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="choc1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7a3c25"/><stop offset="100%" stop-color="#4a1f0f"/></linearGradient>
        <linearGradient id="choc2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5c2a14"/><stop offset="100%" stop-color="#3a160a"/></linearGradient>
        <linearGradient id="cream1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffccd5"/><stop offset="100%" stop-color="#ff85a1"/></linearGradient>
        <linearGradient id="cream2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffc8d3"/><stop offset="100%" stop-color="#ff9ab5"/></linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#00000055"/>
        </filter>

/* ══════════════════════════════════════════════
   STAR FIELD
══════════════════════════════════════════════ */
(function(){
  const canvas = document.getElementById('starCanvas');
  const ctx = canvas.getContext('2d');
  let stars = [], W, H;
  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for(let i=0;i<220;i++) stars.push({
    x:Math.random()*2000, y:Math.random()*2000,
    r:Math.random()*1.4+.2,
    o:Math.random(), ov:Math.random()*.008+.002
  });
  function drawStars(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{
      s.o += s.ov; if(s.o>1||s.o<0) s.ov*=-1;
      ctx.beginPath();
      ctx.arc(s.x%W, s.y%H, s.r, 0, Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${s.o.toFixed(2)})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  drawStars();
})();

/* ══════════════════════════════════════════════
   FIREWORKS
══════════════════════════════════════════════ */
(function(){
  const canvas = document.getElementById('fwCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles=[], active=false;
  function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  resize(); window.addEventListener('resize',resize);

  function Particle(x,y,color){
    this.x=x; this.y=y; this.color=color;
    const angle=Math.random()*Math.PI*2;
    const speed=Math.random()*6+2;
    this.vx=Math.cos(angle)*speed; this.vy=Math.sin(angle)*speed;
    this.alpha=1; this.radius=Math.random()*3+1.5;
    this.decay=Math.random()*.018+.01;
  }

  function launchFirework(){
    const x=Math.random()*W*.8+W*.1, y=Math.random()*H*.5+H*.05;
    const colors=['#ff6b8a','#ffd700','#c084fc','#2dd4bf','#ff9a00','#fff','#ff3366','#a78bfa'];
    const col=colors[Math.floor(Math.random()*colors.length)];
    for(let i=0;i<80;i++) particles.push(new Particle(x,y,col));
  }

  let fwTimer;
  function startFireworks(){
    active=true;
    canvas.classList.add('show');
    launchFirework();
    fwTimer=setInterval(launchFirework,700);
    setTimeout(stopFireworks, 5000);
  }
  function stopFireworks(){
    clearInterval(fwTimer);
    setTimeout(()=>{ active=false; canvas.classList.remove('show'); },2000);
  }

  function drawFW(){
    ctx.fillStyle='rgba(6,4,18,.18)';
    ctx.fillRect(0,0,W,H);
    particles=particles.filter(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=.07;
      p.vx*=.98; p.alpha-=p.decay;
      if(p.alpha<=0) return false;
      ctx.globalAlpha=p.alpha;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
      ctx.fillStyle=p.color;
      ctx.fill();
      return true;
    });
    ctx.globalAlpha=1;
    requestAnimationFrame(drawFW);
  }
  drawFW();
  window.__startFireworks = startFireworks;
})();

/* ══════════════════════════════════════════════
   ROSE PETALS
══════════════════════════════════════════════ */
function rainPetals(n=30){
  const symbols=['🌸','🌹','🌺','💮','🏵️'];
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='petal';
      el.textContent=symbols[Math.floor(Math.random()*symbols.length)];
      el.style.cssText=`left:${Math.random()*100}vw;animation-duration:${4+Math.random()*5}s;animation-delay:${Math.random()*.5}s;font-size:${1.2+Math.random()*.8}rem;`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),6000);
    }, i*120);
  }
}

/* ══════════════════════════════════════════════
   FLOATING HEARTS
══════════════════════════════════════════════ */
function floatHearts(n=20){

    setTimeout(()=>{
      const el=document.createElement('div');

      el.textContent=['💖','💗','💕','💓','💞'][Math.floor(Math.random()*5)];
      el.style.cssText=`left:${Math.random()*100}vw;animation-duration:${3+Math.random()*4}s;font-size:${1.2+Math.random()*1.2}rem;`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),7000);
    }, i*150);
  }
}

/* ══════════════════════════════════════════════
   TYPEWRITER
══════════════════════════════════════════════ */
function typewrite(el, text, delay=0){
  return new Promise(resolve=>{
    let chars = [...text];
    let i=0;
    el.innerHTML='';
    function next(){
      if(i>=chars.length){ resolve(); return; }
      const span=document.createElement('span');
      span.className='char visible';
      span.textContent=chars[i]==' '?' ':chars[i];
      if(chars[i]==' ') span.style.display='inline';
      el.appendChild(span);
      i++;
      setTimeout(next, chars[i-1]==='.' || chars[i-1]===',' ? 80 : 28);
    }
    setTimeout(next, delay);
  });
}
