<!DOCTYPE html>
<html lang="en">
<head>
    <title>Happy Birthday Avani</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="assets/stylesheet.css">
    <link rel="stylesheet" type="text/css" href="assets/advanced.css">
    <link rel="stylesheet" type="text/css" href="assets/loading.css">
    <style>
        .landing-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .landing-title {
            font-size: 3rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        .landing-subtitle {
            font-size: 1.5rem;
            color: rgba(255,255,255,0.9);
            margin-bottom: 50px;
        }
        .options-grid {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .option-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(255,255,255,0.3);
            min-width: 200px;
        }
        .option-card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.25);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .option-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .option-title {
            font-size: 1.5rem;
            color: white;
            font-weight: bold;
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #e60073; }
            to { text-shadow: 0 0 20px #fff, 0 0 30px #ff4da6, 0 0 40px #ff4da6; }
        }
        .balloons-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        .balloon {
            position: absolute;
            font-size: 3rem;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="balloons-bg">
            <div class="balloon" style="top: 10%; left: 10%; animation-delay: 0s;">🎈</div>
            <div class="balloon" style="top: 20%; right: 15%; animation-delay: 1s;">🎉</div>
            <div class="balloon" style="top: 60%; left: 20%; animation-delay: 2s;">🎂</div>
            <div class="balloon" style="top: 70%; right: 10%; animation-delay: 3s;">🎁</div>
            <div class="balloon" style="top: 40%; left: 50%; animation-delay: 4s;">✨</div>
        </div>
        
        <h1 class="landing-title">Happy Birthday Avani</h1>
        <p class="landing-subtitle">Choose your surprise</p>
        
        <div class="options-grid">
            <div class="option-card" onclick="window.location.href='chat-want-to-say/index.html'">
                <div class="option-icon">💬</div>
                <div class="option-title">Chat Messages</div>
            </div>
            <div class="option-card" onclick="window.location.href='chat-want-to-say/birthday-cake/index.html'">
                <div class="option-icon">🎂</div>
                <div class="option-title">Birthday Cake</div>
            </div>
        </div>
    </div>
</body>
</html>
